<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>400 - Bad Request</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container { text-align: center; max-width: 500px; padding: 40px; }
        .code {
            font-size: 8em;
            font-weight: 200;
            color: #e94560;
            line-height: 1;
            margin-bottom: 10px;
        }
        h2 { color: #ccc; font-weight: 400; font-size: 1.4em; margin-bottom: 20px; }
        p { color: #777; font-size: 0.95em; line-height: 1.6; margin-bottom: 30px; }
        a {
            display: inline-block;
            color: #5dade2;
            text-decoration: none;
            border: 1px solid #5dade2;
            padding: 10px 24px;
            border-radius: 4px;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        a:hover { background: #5dade2; color: #0f0f0f; }
        .line { width: 60px; height: 2px; background: #e94560; margin: 0 auto 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">400</div>
        <div class="line"></div>
        <h2>Bad Request</h2>
        <p>Le serveur n'a pas pu comprendre la requete en raison d'une syntaxe incorrecte.</p>
        <a href="/">Retour a l'accueil</a>
    </div>
</body>
</html>
