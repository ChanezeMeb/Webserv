# Configuration multi-CGI
# Test avec : ./webserv tests/configs/test_multi_cgi.conf

[server]
    listen 8080;
    server_name localhost;
    root ./www;

    [location /]
        allowed_methods GET;
        index index.html;
    [/location]

    [location /cgi-test]
        root ./www/cgi-test;
        allowed_methods GET POST;
        cgi_extension .py /usr/bin/python3;
        cgi_extension .sh /bin/bash;
    [/location]

[/server]