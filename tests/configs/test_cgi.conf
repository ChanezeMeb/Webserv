# ============================================================
# Configuration de test pour CGI
# ============================================================
# 
# Pour tester :
#   1. ./webserv tests/configs/test_cgi.conf
#   2. curl http://localhost:8080/cgi/test.py
#   3. curl "http://localhost:8080/cgi/test.py?name=Joohee&lang=fr"
#   4. curl -X POST -d "message=Hello" http://localhost:8080/cgi/test.py
# ============================================================

[server]
    listen 8080;
    server_name localhost;
    root ./www;

    # Page d'accueil statique
    [location /]
        allowed_methods GET;
        index index.html;
    [/location]

    # Scripts CGI Python
    [location /cgi-test]
        root ./www/cgi-test;
        allowed_methods GET POST;
        cgi_extension .py /usr/bin/python3;
    [/location]

[/server]