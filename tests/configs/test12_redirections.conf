# Test 12 : Tous les codes de redirection (doit réussir)
# Vérifie que 301, 302, 303, 307, 308 sont acceptés

[server]
listen 8080;
server_name localhost;
root ./www;

[location /old-page]
return 301 https://www.example.com/new-page;
[/location]

[location /temp-redirect]
return 302 https://www.example.com/temp;
[/location]

[location /see-other]
return 303 https://www.example.com/other;
[/location]

[location /temp-strict]
return 307 https://www.example.com/strict;
[/location]

[location /perm-strict]
return 308 https://www.example.com/permanent;
[/location]

[/server]