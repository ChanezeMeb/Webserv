# Test 4 : Parsing des tailles
# Vérifie que K, M, G sont bien parsés

[server]
listen 8080;
server_name localhost;
root ./www;
client_max_body_size 1G;

[location /small]
allowed_methods POST;
client_max_body_size 1024;
[/location]

[location /medium]
allowed_methods POST;
client_max_body_size 512K;
[/location]

[location /large]
allowed_methods POST;
client_max_body_size 100M;
[/location]

[/server]