# Test 3 : Plusieurs serveurs
# Vérifie que le parser gère plusieurs blocs server

[server]
listen 8080;
server_name site1.com;
root ./www/site1;

[location /]
allowed_methods GET;
index index.html;
[/location]

[/server]

[server]
listen 8081;
server_name site2.com;
root ./www/site2;

[location /]
allowed_methods GET POST;
index home.html;
[/location]

[location /api]
allowed_methods GET POST DELETE;
[/location]

[/server]

[server]
listen 9000;
server_name api.example.com;
root ./www/api;
client_max_body_size 1M;

[location /]
allowed_methods GET POST DELETE;
[/location]

[/server]